<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AiAxia</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="ob-shell">
    <header class="ob-topbar">
        <span class="ob-wordmark">AiAxia</span>
        <span class="ob-progress" aria-hidden="true"></span>
    </header>

    <main class="ob-stage">
        <section class="ob-content" aria-labelledby="complete-headline">
            <h1 class="ob-leadin" id="complete-headline">
                We've got your first project sketched, and your documents are queued.
            </h1>

            <div class="ob-complete-summary">
                <p class="ob-complete-line">
                    <span><strong>Acme Health</strong> is set up as your first project.</span>
                </p>
                <p class="ob-complete-line">
                    <span>Twin chat will use what you shared to focus on <strong>independent primary-care clinics in the US</strong>.</span>
                </p>
                <p class="ob-complete-line">
                    <span><strong>3</strong> documents queued for processing.</span>
                </p>
            </div>

            <div class="ob-actions" style="margin-top: var(--space-7);">
                <a href="welcome.html" class="ob-btn ob-btn--primary">
                    Open dashboard
                    <span class="ob-btn-arrow" aria-hidden="true">&rarr;</span>
                </a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
