<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AiAxia onboarding preview</title>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        body { padding: 80px 32px; max-width: 720px; margin: 0 auto; }
        h1 { font-family: var(--font-serif); font-weight: 400; font-size: 2rem; margin: 0 0 24px; }
        ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        li a {
            display: block;
            padding: 16px 20px;
            border: 1px solid var(--color-margin);
            border-radius: var(--radius-md);
            background: var(--color-field-cream);
            color: var(--color-ink);
            font-weight: 500;
            transition: background 180ms ease, border-color 180ms ease;
        }
        li a:hover {
            background: var(--color-parchment);
            border-color: var(--color-ink-soft);
        }
        p.t-helper { margin-bottom: 32px; }
    </style>
</head>
<body>
    <h1>AiAxia onboarding preview</h1>
    <p class="t-helper">
        Static HTML mirror of the live Blade flow, with sample data baked in. Use with /impeccable live for visual iteration.
    </p>
    <ul>
        <li><a href="welcome.html">1. Welcome</a></li>
        <li><a href="company.html">2. Company</a></li>
        <li><a href="intent.html">3. Intent</a></li>
        <li><a href="upload.html">4. Upload</a></li>
        <li><a href="complete.html">5. Complete</a></li>
    </ul>
</body>
</html>
