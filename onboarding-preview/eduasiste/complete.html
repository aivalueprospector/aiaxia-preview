<!DOCTYPE html>
<html lang="en" data-theme="eduasiste">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>EduAsiste</title>
    <link rel="stylesheet" href="../../css/app.css">
</head>
<body>
<div class="ob-shell">
    <header class="ob-topbar">
        <span class="ob-brand">
            <img class="ob-logo" src="https://eduasiste.org/chat/v3/avatar_eduardo_owl.png" alt="">
            <span class="ob-wordmark" style="font-style: normal; font-weight: 700;">EduAsiste</span>
        </span>
        <span class="ob-progress" aria-hidden="true"></span>
    </header>

    <main class="ob-stage">
        <section class="ob-content" aria-labelledby="complete-headline">
            <h1 class="ob-leadin" id="complete-headline">
                Your school is set up. Roster and courses are ready for the dashboard.
            </h1>

            <div class="ob-complete-summary">
                <p class="ob-complete-line">
                    <span><strong>Lincoln High School</strong> is your active workspace.</span>
                </p>
                <p class="ob-complete-line">
                    <span><strong>2</strong> teachers, <strong>2</strong> courses, <strong>2</strong> students added.</span>
                </p>
                <p class="ob-complete-line">
                    <span><strong>2</strong> documents queued for processing.</span>
                </p>
            </div>

            <div class="ob-actions" style="margin-top: var(--space-7);">
                <a href="../../dashboard-preview/dashboard.html?theme=eduasiste" class="ob-btn ob-btn--primary">
                    Open dashboard
                    <span class="ob-btn-arrow" aria-hidden="true">&rarr;</span>
                </a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
