<!DOCTYPE html>
<html lang="en" data-theme="eduasiste">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>EduAsiste</title>
    <link rel="stylesheet" href="../../css/app.css">
</head>
<body>
<div class="ob-shell">
    <header class="ob-topbar">
        <span class="ob-brand">
            <img class="ob-logo" src="https://eduasiste.org/chat/v3/avatar_eduardo_owl.png" alt="">
            <span class="ob-wordmark" style="font-style: normal; font-weight: 700;">EduAsiste</span>
        </span>
        <span class="ob-progress" aria-hidden="true"></span>
    </header>

    <main class="ob-stage">
        <section class="ob-content ob-welcome" aria-labelledby="welcome-headline">
            <h1 class="ob-leadin" id="welcome-headline">
                Five quick steps, then your school dashboard.
            </h1>

            <p class="ob-subhead">
                A few minutes. Resume any time if you step away.
            </p>

            <div class="ob-actions">
                <a href="school.html" class="ob-btn ob-btn--primary">
                    Start
                    <span class="ob-btn-arrow" aria-hidden="true">&rarr;</span>
                </a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
