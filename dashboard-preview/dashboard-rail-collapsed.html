<!DOCTYPE html>
<html lang="en" data-theme="aiaxia">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AiAxia · rail collapsed</title>
    <script>
      // Force collapsed state for this preview page
      try { localStorage.setItem('aiaxia.dashboard.twinRailCollapsed', '1'); } catch (e) {}
    </script>
    <script src="preview-theme.js"></script>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="dash-shell-v2">
    <header class="dash-topbar-v2">
        <span class="dash-topbar-v2__brand">
            <span class="dash-topbar-v2__logo" aria-hidden="true">
                <span class="dash-topbar-v2__logo--placeholder">A</span>
            </span>
            <span class="dash-topbar-v2__company" data-tenant-copy="dashboard.company_name">Acme Health</span>
        </span>
        <span class="dash-topbar-v2__spacer"></span>
        <span class="dash-topbar-v2__user">
            <button type="button" class="dash-topbar-v2__user-trigger" data-action="user-menu-toggle" aria-haspopup="menu" aria-expanded="false">
                <span data-tenant-copy="dashboard.user_first_name">Maya</span>
            </button>
            <div class="dash-usermenu" role="menu" data-open="false">
                <a class="dash-usermenu__item" role="menuitem" href="billing.html"><span aria-hidden="true">$</span> Billing</a>
                <a class="dash-usermenu__item" role="menuitem" href="settings.html"><span aria-hidden="true">⚙</span> Settings</a>
                <span class="dash-usermenu__divider" role="separator"></span>
                <a class="dash-usermenu__item" role="menuitem" href="#"><span aria-hidden="true">↩</span> Logout</a>
            </div>
        </span>
    </header>

    <div class="dash-body dash-body--rail-collapsed">
        <nav class="dash-nav" aria-label="Dashboard sections">
            <a class="dash-nav__item dash-nav__item--active" href="dashboard.html" aria-current="page">
                <span class="dash-nav__icon" aria-hidden="true">⌂</span><span class="dash-nav__label">Home</span>
            </a>
            <div class="dash-nav__group dash-nav__group--business">
                <span class="dash-nav__group-label">Workspace</span>
                <a class="dash-nav__item" href="projects.html"><span class="dash-nav__icon" aria-hidden="true">◇</span><span class="dash-nav__label">Projects</span></a>
                <a class="dash-nav__item" href="employees-business.html"><span class="dash-nav__icon" aria-hidden="true">◷</span><span class="dash-nav__label">Employees</span></a>
            </div>
            <div class="dash-nav__group dash-nav__group--school">
                <span class="dash-nav__group-label">School</span>
                <a class="dash-nav__item" href="employees-school.html"><span class="dash-nav__icon" aria-hidden="true">◷</span><span class="dash-nav__label">Employees</span></a>
                <a class="dash-nav__item" href="classes.html"><span class="dash-nav__icon" aria-hidden="true">▤</span><span class="dash-nav__label">Classes</span></a>
                <a class="dash-nav__item" href="students.html"><span class="dash-nav__icon" aria-hidden="true">◯</span><span class="dash-nav__label">Students</span></a>
            </div>
        </nav>

        <main class="dash-center">
            <section class="dash-greeting">
                <h1>Welcome back, <span data-tenant-copy="dashboard.user_first_name">Maya</span>.</h1>
                <span class="dash-project-pill" data-tenant-copy="dashboard.project_pill">Acme Health · active project</span>
            </section>
            <p class="dash-section-meta" style="margin-top: var(--space-5);">Twin rail collapsed. Click the chat icon on the right to expand.</p>
        </main>

        <aside class="dash-twin-rail dash-twin-rail--collapsed" aria-label="Twin chat">
            <button type="button" class="dash-twin-rail__rail-toggle"
                    data-action="rail-toggle"
                    aria-controls="dash-twin-panel"
                    aria-expanded="false"
                    title="Open twin chat">
                <span aria-hidden="true">💬</span>
                <span class="dash-twin-rail__pulse" aria-hidden="true"></span>
            </button>
            <div class="dash-twin-rail__header">
                <h3 class="dash-twin-rail__title">Twin chat</h3>
                <button type="button" class="dash-twin-rail__toggle" data-action="rail-toggle" aria-controls="dash-twin-panel" aria-expanded="false">
                    <span aria-hidden="true">›</span>
                </button>
            </div>
            <div class="dash-twin-rail__body" id="dash-twin-panel"></div>
        </aside>
    </div>
</div>
<script src="dash-shell.js"></script>
</body>
</html>
