<!doctype html>
<html lang="en" data-brand="proasiste">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Twin Management</title>
<link rel="stylesheet" href="shared/styles.css">
</head>
<body>

<main class="login-shell">
  <div class="login-card">
    <div class="login-card__head">
      <div class="login-card__brand" data-brand-mark>P</div>
      <div class="login-card__title">Sign in to <span data-brand-name>ProAsiste</span></div>
      <div class="login-card__sub">Use your work email and password.</div>
    </div>

    <form class="form">
      <div class="field">
        <label class="field__label" for="email">Email</label>
        <input type="email" id="email" class="input" autocomplete="username" value="rosa@quintana-industrial.mx">
      </div>
      <div class="field">
        <label class="field__label" for="password">Password</label>
        <input type="password" id="password" class="input" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn--primary">Sign in</button>
    </form>

    <div class="login-card__foot">
      <a href="#">Forgot password?</a>
      <div style="margin-top: 12px;">Accounts are created by your Business Partner or organization head.</div>
    </div>
  </div>
</main>

<div class="proto-toggle" id="proto-toggle" role="group" aria-label="Preview brand"></div>
<script src="shared/nav.js"></script>
</body>
</html>
